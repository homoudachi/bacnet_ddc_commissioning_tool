name: windows-exe

on:
  pull_request:
  push:
    branches:
      - main
      - "cursor/**"

jobs:
  pyinstaller-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-packaging.txt

      - name: Build single-file exe
        run: python -m PyInstaller tools/packaging/runtime.spec

      - name: Optional Authenticode sign (repository secrets)
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: pwsh -File tools/packaging/sign_windows_exe.ps1

      - name: Smoke test
        run: dist/bacnet-commissioning.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-commissioning-windows
          path: dist/bacnet-commissioning.exe
