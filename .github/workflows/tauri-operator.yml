name: tauri-operator

on:
  pull_request:
    paths:
      - "desktop/tauri-operator/**"
      - ".github/workflows/tauri-operator.yml"
      - "rust-toolchain.toml"
  push:
    branches:
      - main
      - "cursor/**"
    paths:
      - "desktop/tauri-operator/**"
      - ".github/workflows/tauri-operator.yml"
      - "rust-toolchain.toml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle_flag: deb
            artifact_name: tauri-operator-deb
            artifact_path: desktop/tauri-operator/src-tauri/target/release/bundle/deb/*.deb
            extra_apt: true
          - os: windows-latest
            bundle_flag: nsis
            artifact_name: tauri-operator-nsis
            artifact_path: desktop/tauri-operator/src-tauri/target/release/bundle/nsis/*.exe
            extra_apt: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        if: matrix.extra_apt
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/tauri-operator/package-lock.json

      - name: Build Tauri bundle
        working-directory: desktop/tauri-operator
        shell: bash
        run: |
          npm ci
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npx tauri build -c '{"bundle":{"targets":["deb"]}}'
          else
            npx tauri build -b nsis
          fi

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
