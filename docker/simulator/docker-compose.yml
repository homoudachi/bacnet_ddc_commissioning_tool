# Runnable BACnet/IP lab device (builds from this repo).
# Previous placeholder images (ghcr.io/example/...) were spec-only; use `bacnet-dev` profile.
#
# Quick start:
#   docker compose -f docker/simulator/docker-compose.yml --profile bacnet-dev up -d --build
#   python3 tools/runtime/app.py verify-bip-list --run-dir <run-dir> --strict ...
#   docker compose -f docker/simulator/docker-compose.yml --profile bacnet-dev down

name: bacnet-simulator-lab

services:
  bacnet-fcu-sim:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-dev"]
    ports:
      - "127.0.0.1:47808:47808/udp"
    environment:
      DEVICE_INSTANCE: "21001"
      BACNET_UDP_PORT: "47808"
      # Optional initial presentValue overrides (float/int):
      # SIM_AI_SAT: "21.5"
      # SIM_MSV_TEST_MODE: "1"
      # SIM_AO_CHW_VALVE: "0"
    networks:
      - bacnet_lab

  bacnet-fcu-sim-02:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-dev"]
    ports:
      - "127.0.0.1:47809:47809/udp"
    environment:
      DEVICE_INSTANCE: "21002"
      BACNET_UDP_PORT: "47809"
      SIM_AI_SAT: "18.0"
      SIM_MSV_TEST_MODE: "2"
    networks:
      - bacnet_lab

  bacnet-hrv-sim:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-dev"]
    ports:
      - "127.0.0.1:47810:47810/udp"
    environment:
      SIM_PROFILE: "hrv"
      DEVICE_INSTANCE: "22001"
      BACNET_UDP_PORT: "47810"
      SIM_MSV_TEST_MODE: "1"
      SIM_BI_FAN_ACTIVE: "1"
      SIM_AI_OA_TEMP: "8.5"
      SIM_AI_SUPPLY_TEMP: "19.2"
      SIM_AI_EXHAUST_TEMP: "18.0"
      SIM_AV_SUPPLY_FAN: "45"
      SIM_AV_EXHAUST_FAN: "44"
    networks:
      - bacnet_lab

  bacnet-fcu-sim-03:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-dev"]
    ports:
      - "127.0.0.1:47811:47811/udp"
    environment:
      DEVICE_INSTANCE: "21003"
      BACNET_UDP_PORT: "47811"
      SIM_AI_SAT: "20.5"
      SIM_MSV_TEST_MODE: "1"
    networks:
      - bacnet_lab

  # --- bacnet-bbmd-lab: foreign-device path to an isolated subnet device (CI / local) ---
  bacnet-bbmd-lab:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-bbmd-lab"]
    ports:
      - "127.0.0.1:47830:47830/udp"
    command: ["python", "-u", "/app/bbmd_runner.py"]
    environment:
      BACNET_BBMD_PORT: "47830"
      BBMD_DEVICE_INSTANCE: "111000"
      # Directed broadcast for bacnet_bbmd_isolated /24 (see networks below).
      BACNET_BDT_BROADCAST_PEERS: "172.29.0.255:47808"
    networks:
      bacnet_lab: {}
      bacnet_bbmd_isolated: {}

  bacnet-fcu-bbmd-isolated:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-bbmd-lab"]
    environment:
      DEVICE_INSTANCE: "21004"
      BACNET_UDP_PORT: "47808"
      SIM_AI_SAT: "22.0"
      SIM_MSV_TEST_MODE: "1"
    networks:
      bacnet_bbmd_isolated:
        ipv4_address: 172.29.0.10

  bacnet-bbmd-probe:
    build:
      context: ./bacnet-device
      dockerfile: Dockerfile
    image: bacnet-ddc-commissioning-tool/bacnet-fcu-sim:local
    profiles: ["bacnet-bbmd-lab"]
    network_mode: "service:bacnet-bbmd-lab"
    entrypoint: ["python", "-u", "/app/probe_foreign_read.py"]
    environment:
      BACNET_FD_BBMD_HOST: "127.0.0.1"
      BACNET_FD_BBMD_PORT: "47830"
      BACNET_FD_TTL_SECONDS: "120"
      BACNET_FD_TARGET: "172.29.0.10:47808"
      BACNET_FD_DEVICE_LOW: "21004"
      BACNET_FD_DEVICE_HIGH: "21004"
      BACNET_FD_OBJECT: "analogInput,2"

networks:
  bacnet_lab:
    driver: bridge
  bacnet_bbmd_isolated:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
